name: Eval Package CI

on:
  # TODO(tech-debt): re-enable once `pip install -e "../tools"` install path
  # and eval-package test baseline are fixed. Manual-only for now.
  workflow_dispatch:

defaults:
  run:
    working-directory: agentic-v2-eval

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "../tools"
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --cov=src/agentic_v2_eval --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v6
        with:
          files: agentic-v2-eval/coverage.xml
          flags: eval-package
          fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff
        run: ruff check src/

      - name: Run ruff format check
        run: ruff format --check src/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "../tools"
          pip install -e ".[dev]"

      # TODO(Sprint B #7-followup, 2026-04-21): clear 35 mypy findings then drop continue-on-error.
      # Unmasked from `|| true` on 2026-04-21 — gate is now visible but non-blocking
      # until the existing findings are triaged (mostly missing return annotations,
      # no-any-return, and unsafe Exception handling in runners/streaming.py).
      - name: Run mypy
        continue-on-error: true
        run: |
          mypy src/agentic_v2_eval --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: agentic-v2-eval/dist/
