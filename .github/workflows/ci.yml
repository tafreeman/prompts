name: CI

on:
  push:
    branches: [main, agenticv2]
  pull_request:
    branches: [main, agenticv2]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest-cov
          pip install -e "tools/"
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Verify dependency consistency
        run: pip check
      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files
      - name: Run tests with coverage
        run: |
          cd agentic-workflows-v2
          python -m pytest -q --cov=agentic_v2 --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Check docs references
        run: |
          python agentic-workflows-v2/scripts/check_docs_refs.py
      - name: Build docs (optional)
        run: |
          pip install sphinx sphinx-autodoc-typehints myst-parser || true
          sphinx-build -b html docs docs/_build/html || true

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "tools/"
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Run mypy
        run: |
          cd agentic-workflows-v2
          python -m mypy agentic_v2 --ignore-missing-imports

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "tools/"
          pip install -e "agentic-workflows-v2/[dev]"
      - name: Validate all YAML workflow definitions
        run: |
          python -c "
          from pathlib import Path
          from agentic_v2.workflows import WorkflowLoader

          defs_dir = Path('agentic-workflows-v2/agentic_v2/workflows/definitions')
          loader = WorkflowLoader(definitions_dir=defs_dir)
          workflows = loader.list_workflows()
          print(f'Discovered {len(workflows)} workflows')
          for name in workflows:
              wf = loader.load(name)
              print(f'  ✓ {name}: {len(wf.dag.steps)} steps')
          assert len(workflows) >= 10, f'Expected ≥10 workflows, found {len(workflows)}'
          print('All workflow definitions validated successfully.')
          "
      - name: Run deterministic examples (no API keys)
        run: |
          cd agentic-workflows-v2
          python examples/yaml_workflow.py
          python examples/custom_tool.py
      - name: Verify package imports
        run: |
          python -c "
          from agentic_v2 import DAGExecutor, ExecutionContext, WorkflowLoader
          from agentic_v2.core.protocols import AgentProtocol, ToolProtocol, ExecutionEngine
          from agentic_v2.rag.protocols import RerankerProtocol
          from agentic_v2.rag.config import RAGConfig, RerankerConfig
          from agentic_v2.rag.reranking import NoOpReranker, CrossEncoderReranker, LLMReranker
          print('All critical imports verified.')
          "

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit security scan
        run: |
          bandit -r agentic-workflows-v2/agentic_v2 -c pyproject.toml --severity-level medium
