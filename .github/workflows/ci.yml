name: CI

on:
  push:
    branches: [main, agenticv2]
  pull_request:
    branches: [main, agenticv2]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest-cov
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Verify dependency consistency
        run: pip check
      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files
      - name: Run tests with coverage
        run: |
          cd agentic-workflows-v2
          python -m pytest -q --cov=agentic_v2 --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Check docs references
        run: |
          python agentic-workflows-v2/scripts/check_docs_refs.py
      - name: Build docs (optional)
        run: |
          pip install sphinx sphinx-autodoc-typehints myst-parser || true
          sphinx-build -b html docs docs/_build/html || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install deps
        run: |
          cd agentic-workflows-v2/ui
          npm ci
      - name: Build (TypeScript check + Vite)
        run: |
          cd agentic-workflows-v2/ui
          npm run build
      - name: Run tests with coverage
        run: |
          cd agentic-workflows-v2/ui
          npm run test:coverage

  eval-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-v2-eval/[dev]"
      - name: Run tests
        run: |
          cd agentic-v2-eval
          python -m pytest tests/ -q

  tools-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov
      - name: Run tests
        run: |
          python -m pytest tools/tests/ -q --cov=tools --cov-report=term-missing --cov-fail-under=70

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Run mypy
        run: |
          cd agentic-workflows-v2
          python -m mypy agentic_v2/ --ignore-missing-imports

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev]"
      - name: Validate all YAML workflow definitions
        run: |
          python -c "
          from pathlib import Path
          from agentic_v2.workflows import WorkflowLoader

          defs_dir = Path('agentic-workflows-v2/agentic_v2/workflows/definitions')
          loader = WorkflowLoader(definitions_dir=defs_dir)
          workflows = loader.list_workflows()
          print(f'Discovered {len(workflows)} workflows')
          for name in workflows:
              wf = loader.load(name)
              print(f'  ✓ {name}: {len(wf.dag.steps)} steps')
          assert len(workflows) >= 10, f'Expected ≥10 workflows, found {len(workflows)}'
          print('All workflow definitions validated successfully.')
          "
      - name: Run deterministic examples (no API keys)
        run: |
          cd agentic-workflows-v2
          python examples/yaml_workflow.py
          python examples/custom_tool.py
      - name: Verify package imports
        run: |
          python -c "
          from agentic_v2 import DAGExecutor, ExecutionContext, WorkflowLoader
          from agentic_v2.core.protocols import AgentProtocol, ToolProtocol, ExecutionEngine
          from agentic_v2.rag.protocols import RerankerProtocol
          from agentic_v2.rag.config import RAGConfig, RerankerConfig
          from agentic_v2.rag.reranking import NoOpReranker, CrossEncoderReranker, LLMReranker
          print('All critical imports verified.')
          "

  cross-package-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install workspace packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
          pip install -e "agentic-v2-eval/[dev]"
      - name: Run root cross-package e2e suite
        run: |
          python -m pytest tests/e2e/test_cross_package.py -q -m e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
          pip install -e "agentic-v2-eval/[dev]"
      - name: Run static security scan (bandit)
        run: |
          bandit -r agentic-workflows-v2/agentic_v2/ agentic-v2-eval/src/agentic_v2_eval/ tools/ -ll -q
      - name: Run dependency vulnerability audit (pip-audit)
        run: |
          pip-audit --progress-spinner off --desc
