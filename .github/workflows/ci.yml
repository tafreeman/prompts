name: CI

# CI: verifies Python imports, frontend build, ruff lint, and 80% coverage gate.
# Integration and slow tests are excluded from the fast CI pass.
# Type checking (mypy --strict) enforcement is tracked in docs/adr/ADR-013.

on:
  push:
    branches: [main, agenticv2]
  pull_request:
    branches: [main, agenticv2]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-workflows-v2/[dev]"
          pip install -e "agentic-v2-eval/[dev]"
      - name: Verify critical imports
        run: |
          python -c "
          import agentic_v2
          from agentic_v2.core.protocols import AgentProtocol, ToolProtocol, ExecutionEngine
          from agentic_v2.workflows import WorkflowLoader
          print('Critical imports OK')
          "
      # TODO(tech-debt): re-enable pytest smoke once optional-extra imports
      # (websockets, langchain) are either installed in CI or fully guarded
      # behind try/except in test-collection paths.

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install and build UI
        run: |
          cd agentic-workflows-v2/ui
          npm ci
          npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "agentic-workflows-v2/[dev]"
      - name: Ruff lint check
        run: |
          cd agentic-workflows-v2
          python -m ruff check agentic_v2/ tests/

  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e "agentic-workflows-v2/[dev]"
      - name: Run tests with coverage
        run: |
          cd agentic-workflows-v2
          python -m pytest tests/ -q \
            -m "not integration and not slow" \
            --cov=agentic_v2 \
            --cov-report=term-missing \
            --cov-fail-under=80
