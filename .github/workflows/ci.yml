name: CI

on:
  push:
    branches: [main, agenticv2]
  pull_request:
    branches: [main, agenticv2]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest-cov
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Verify dependency consistency
        run: pip check
      - name: Run pre-commit hooks
        run: |
          pre-commit run --all-files
      - name: Run tests with coverage
        run: |
          cd agentic-workflows-v2
          python -m pytest -q --cov=agentic_v2 --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Check docs references
        run: |
          python agentic-workflows-v2/scripts/check_docs_refs.py
      - name: Build docs (optional)
        run: |
          pip install sphinx sphinx-autodoc-typehints myst-parser || true
          sphinx-build -b html docs docs/_build/html || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json
      - name: Install deps
        run: |
          cd agentic-workflows-v2/ui
          npm ci
      - name: Build (TypeScript check + Vite)
        run: |
          cd agentic-workflows-v2/ui
          npm run build
      - name: Run tests
        run: |
          cd agentic-workflows-v2/ui
          npm run test

  eval-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-v2-eval/[dev]"
      - name: Run tests
        run: |
          cd agentic-v2-eval
          python -m pytest tests/ -q

  tools-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: |
          python -m pytest tools/tests/ -q --cov=tools --cov-report=term-missing --cov-fail-under=70

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e "agentic-workflows-v2/[dev,server,langchain]"
      - name: Run mypy
        run: |
          cd agentic-workflows-v2
          python -m mypy agentic_v2/ --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Run security scan
        run: bandit -r agentic-workflows-v2/agentic_v2/ -ll -q
