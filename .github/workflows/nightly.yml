name: Nightly E2E Reliability

on:
  schedule:
    - cron: '0 7 * * *'  # 03:00 ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  streaming-50x:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: agentic-workflows-v2/ui/package-lock.json

      - name: Install backend
        run: pip install -e "agentic-workflows-v2/[dev,server]"

      - name: Install UI deps
        run: npm --prefix agentic-workflows-v2/ui ci

      - name: Install Playwright browsers
        run: npm --prefix agentic-workflows-v2/ui exec -- playwright install --with-deps chromium

      - name: Run streaming E2E 50x
        id: run50
        continue-on-error: true
        run: |
          fails=0
          for i in $(seq 1 50); do
            if ! npm --prefix agentic-workflows-v2/ui run test:e2e -- streaming.spec.ts; then
              fails=$((fails + 1))
            fi
          done
          echo "fails=$fails" >> "$GITHUB_OUTPUT"

      - name: Append flake record + enforce 0.5% rolling gate
        working-directory: agentic-workflows-v2/ui
        run: |
          node --experimental-strip-types e2e/flake-gate.ts "${{ steps.run50.outputs.fails }}"

      - name: Commit SLO + flake data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add agentic-workflows-v2/tests/slo/
          if git diff --cached --quiet; then
            echo "No SLO data changes to commit."
          else
            git commit -m "chore(slo): nightly data update"
            git push origin HEAD:main
          fi
