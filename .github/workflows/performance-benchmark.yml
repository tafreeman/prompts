name: Performance Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, agenticv2]
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
    inputs:
      max_regression_percent:
        description: "Fail if mean runtime regresses more than this percent"
        type: number
        default: 20

permissions:
  contents: read
  actions: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    env:
      REGRESSION_THRESHOLD_PCT: ${{ inputs.max_regression_percent || 20 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
          pip install -e "agentic-v2-eval/[dev]"

      - name: Run deterministic benchmark and save results
        run: |
          python - <<'PY'
          import json
          import platform
          from datetime import datetime, timezone

          from agentic_v2_eval.metrics.performance import benchmark

          def workload() -> list[int]:
              return sorted(range(2500, 0, -1))

          _, stats = benchmark(workload, iterations=50, warmup=10)

          results = {
              "metadata": {
                  "timestamp_utc": datetime.now(timezone.utc).isoformat(),
                  "python_version": platform.python_version(),
                  "workflow": "performance-benchmark.yml",
                  "benchmark_id": "sorted-desc-2500",
              },
              "metrics": stats,
          }

          with open("benchmark_results.json", "w", encoding="utf-8") as f:
              json.dump(results, f, indent=2, sort_keys=True)

          print(f"Current mean runtime: {stats['mean']:.8f}s")
          PY

      - name: Find latest baseline artifact
        id: baseline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          output = os.environ["GITHUB_OUTPUT"]
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          url = f"https://api.github.com/repos/{repo}/actions/artifacts?name=benchmark-baseline&per_page=100"

          req = urllib.request.Request(
              url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              },
          )
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          artifacts = [a for a in data.get("artifacts", []) if not a.get("expired", True)]
          if artifacts:
              latest = sorted(artifacts, key=lambda a: a["created_at"], reverse=True)[0]
              with open(output, "a", encoding="utf-8") as f:
                  f.write(f"found=true\n")
                  f.write(f"id={latest['id']}\n")
          else:
              with open(output, "a", encoding="utf-8") as f:
                  f.write("found=false\n")
          PY

      - name: Download baseline artifact
        if: steps.baseline.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ARTIFACT_ID: ${{ steps.baseline.outputs.id }}
        run: |
          mkdir -p baseline
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o baseline.zip
          unzip -q baseline.zip -d baseline

      - name: Compare current run to baseline
        if: steps.baseline.outputs.found == 'true'
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          threshold_pct = float(os.environ["REGRESSION_THRESHOLD_PCT"])
          current = json.loads(pathlib.Path("benchmark_results.json").read_text(encoding="utf-8"))
          baseline = json.loads(pathlib.Path("baseline/benchmark_results.json").read_text(encoding="utf-8"))

          current_mean = float(current["metrics"]["mean"])
          baseline_mean = float(baseline["metrics"]["mean"])
          allowed_mean = baseline_mean * (1 + threshold_pct / 100)

          print(f"Baseline mean: {baseline_mean:.8f}s")
          print(f"Current mean : {current_mean:.8f}s")
          print(f"Allowed mean : {allowed_mean:.8f}s ({threshold_pct:.1f}% threshold)")

          if current_mean > allowed_mean:
              print("Performance regression threshold exceeded.")
              sys.exit(1)
          PY

      - name: No baseline summary
        if: steps.baseline.outputs.found != 'true'
        run: |
          echo "No prior benchmark-baseline artifact found. Skipping regression check for this run." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark results artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results-${{ github.run_id }}
          path: benchmark_results.json
          retention-days: 30

      - name: Refresh baseline artifact on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-baseline
          path: benchmark_results.json
          retention-days: 90
          overwrite: true

      - name: Write benchmark summary
        run: |
          python - <<'PY'
          import json

          with open("benchmark_results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          with open("summary.md", "w", encoding="utf-8") as s:
              s.write("## Performance Benchmark\\n\\n")
              s.write(f"- Benchmark ID: `{data['metadata']['benchmark_id']}`\\n")
              s.write(f"- Mean runtime: `{data['metrics']['mean']:.8f}s`\\n")
              s.write(f"- Median runtime: `{data['metrics']['median']:.8f}s`\\n")
              s.write(f"- Min runtime: `{data['metrics']['min']:.8f}s`\\n")
              s.write(f"- Max runtime: `{data['metrics']['max']:.8f}s`\\n")
              s.write(f"- Iterations: `{int(data['metrics']['iterations'])}`\\n")
          PY
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
