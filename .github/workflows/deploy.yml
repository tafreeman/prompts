name: Release Pipeline

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release"
        type: boolean
        required: true
        default: false
      release_tag:
        description: "Tag to release (required for manual publish, e.g. v1.2.3)"
        type: string
        required: false
      prerelease:
        description: "Mark as prerelease when publishing manually"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release-assets:
    name: Build release assets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build source and wheel artifacts
        run: |
          python -m build --sdist --wheel .
          python -m build --sdist --wheel agentic-workflows-v2
          python -m build --sdist --wheel agentic-v2-eval

      - name: Detect Dockerfile
        id: docker_backend
        shell: bash
        run: |
          if [[ -f Dockerfile ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect UI Dockerfile
        id: docker_frontend
        shell: bash
        run: |
          if [[ -f Dockerfile.ui ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.docker_backend.outputs.exists == 'true' || steps.docker_frontend.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Prepare image artifact directory
        if: steps.docker_backend.outputs.exists == 'true' || steps.docker_frontend.outputs.exists == 'true'
        run: mkdir -p release-assets/image

      - name: Build backend OCI image archive
        if: steps.docker_backend.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: backend-dev
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          outputs: type=oci,dest=release-assets/image/prompts-backend.oci

      - name: Build frontend OCI image archive
        if: steps.docker_frontend.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.ui
          target: frontend-dev
          tags: ghcr.io/${{ github.repository }}/ui:${{ github.sha }}
          outputs: type=oci,dest=release-assets/image/prompts-frontend.oci

      - name: Summarize image strategy
        if: steps.docker_backend.outputs.exists != 'true' && steps.docker_frontend.outputs.exists != 'true'
        run: |
          {
            echo "## Image Artifact"
            echo ""
            echo "No Dockerfiles were found, so this run published source/wheel artifacts only."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets/python/root
          mkdir -p release-assets/python/agentic-workflows-v2
          mkdir -p release-assets/python/agentic-v2-eval
          cp -v dist/* release-assets/python/root/
          cp -v agentic-workflows-v2/dist/* release-assets/python/agentic-workflows-v2/
          cp -v agentic-v2-eval/dist/* release-assets/python/agentic-v2-eval/
          (cd release-assets && find . -type f -print0 | xargs -0 sha256sum) > release-assets/SHA256SUMS

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error
          retention-days: 30

  attest-release-assets:
    name: Attest release assets
    runs-on: ubuntu-latest
    needs: build-release-assets
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "release-assets/**"

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-release-assets
      - attest-release-assets
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
    environment:
      name: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: release-assets
          path: release-assets

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${{ inputs.release_tag }}" ]]; then
            echo "Manual publish requires 'release_tag' input."
            exit 1
          fi

          echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag exists (manual publish)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.value }}"
          git fetch --tags --force
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${tag}" "${GITHUB_SHA}"
            git push origin "${tag}"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: release-assets/**
